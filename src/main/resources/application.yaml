spring:
  application:
    name: academy

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/academyDB}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:backend#26}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-jwt-authentication-2026}
  expiration: ${JWT_EXPIRATION:3600000}